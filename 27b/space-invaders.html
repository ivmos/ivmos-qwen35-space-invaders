<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Space Invaders</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            display: flex;
            flex-direction: column;
        }

        canvas {
            border: 4px solid #0f0;
            box-shadow: 0 0 20px #0f0, inset 0 0 20px rgba(0,255,0,0.1);
        }

        #ui {
            display: flex;
            justify-content: space-between;
            background: #000;
            color: #0f0;
            padding: 10px 20px;
            border-bottom: 2px solid #0f0;
            font-size: 18px;
        }

        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            font-size: 32px;
            text-align: center;
            text-shadow: 0 0 10px #0f0;
            display: none;
        }

        .blinking {
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="ui">
            <span>SCORE: <span id="score">0</span></span>
            <span>LIVES: <span id="lives">3</span></span>
            <span>LEVEL: <span id="level">1</span></span>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="message"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 600;

        let score = 0;
        let lives = 3;
        let level = 1;
        let gameOver = false;
        let gameWon = false;
        let particles = [];

        const player = {
            x: GAME_WIDTH / 2 - 25,
            y: GAME_HEIGHT - 60,
            width: 50,
            height: 30,
            speed: 7,
            color: '#0f0'
        };

        let bullets = [];
        let enemyBullets = [];
        let enemies = [];
        let powerUps = [];

        let enemyDirection = 1;
        let enemySpeed = 2;
        const ENEMY_ROWS = 5;
        const ENEMY_COLS = 10;
        const ENEMY_WIDTH = 40;
        const ENEMY_HEIGHT = 30;
        const ENEMY_PADDING = 15;

        let keys = {};

        function initEnemies() {
            enemies = [];
            for (let row = 0; row < ENEMY_ROWS; row++) {
                for (let col = 0; col < ENEMY_COLS; col++) {
                    const x = 100 + col * (ENEMY_WIDTH + ENEMY_PADDING);
                    const y = 50 + row * (ENEMY_HEIGHT + ENEMY_PADDING);
                    enemies.push({
                        x, y, width: ENEMY_WIDTH, height: ENEMY_HEIGHT,
                        type: row < 2 ? 'squid' : row < 4 ? 'crab' : 'octopus',
                        alive: true,
                        frame: 0
                    });
                }
            }
        }

        function drawPlayer() {
            ctx.fillStyle = player.color;
            const x = player.x;
            const y = player.y;
            ctx.fillRect(x + 20, y, 10, 15);
            ctx.fillRect(x, y + 15, 50, 15);
            ctx.fillRect(x + 5, y + 30, 10, 5);
            ctx.fillRect(x + 35, y + 30, 10, 5);
        }

        function drawEnemy(enemy) {
            const colors = ['#ff0', '#f0f', '#f80'];
            ctx.fillStyle = colors[enemies.indexOf(enemy) % 2];
            const x = enemy.x;
            const y = enemy.y;
            const frame = Math.floor(Date.now() / 500) % 2;
            switch (enemy.type) {
                case 'squid':
                    ctx.fillRect(x + 4, y, 32, 10);
                    ctx.fillRect(x, y + 10, 40, 8);
                    ctx.fillRect(x, y + 18, 10, 5);
                    ctx.fillRect(x + 12, y + 23, 8, 7);
                    ctx.fillRect(x + 20, y + 18, 8, 12);
                    ctx.fillRect(x + 28, y + 23, 8, 7);
                    ctx.fillRect(x + 30, y + 18, 10, 5);
                    break;
                case 'crab':
                    ctx.fillRect(x + 4, y, 32, 6);
                    if (frame) {
                        ctx.fillRect(x, y + 2, 10, 15);
                        ctx.fillRect(x + 30, y + 2, 10, 15);
                    } else {
                        ctx.fillRect(x, y + 12, 10, 7);
                        ctx.fillRect(x + 30, y + 12, 10, 7);
                    }
                    ctx.fillRect(x + 6, y + 6, 28, 15);
                    ctx.fillRect(x + 6, y + 24, 4, 6);
                    ctx.fillRect(x + 30, y + 24, 4, 6);
                    break;
                case 'octopus':
                    ctx.fillRect(x + 8, y, 24, 15);
                    ctx.fillRect(x, y + 15, 40, 8);
                    ctx.fillRect(x, y + 23, 8, 7);
                    ctx.fillRect(x + 16, y + 23, 8, 7);
                    ctx.fillRect(x + 32, y + 23, 8, 7);
                    if (frame) {
                        ctx.fillRect(x, y, 8, 5);
                        ctx.fillRect(x + 32, y + 8, 8, 5);
                    } else {
                        ctx.fillRect(x + 4, y, 8, 5);
                        ctx.fillRect(x + 28, y + 6, 8, 5);
                    }
                    break;
            }
        }

        function drawBullets() {
            ctx.fillStyle = '#0f0';
            bullets.forEach(b => ctx.fillRect(b.x - 3, b.y, 6, 12));
        }

        function drawEnemyBullets() {
            ctx.fillStyle = '#f00';
            enemyBullets.forEach(b => ctx.beginPath());
            enemyBullets.forEach(b => {
                ctx.fillStyle = '#f00';
                const y = b.y + Math.sin(Date.now() / 100) * 3;
                ctx.fillRect(b.x - 3, y, 6, 12);
            });
        }

        function drawEnemyRow() {
            enemies.forEach(e => { if (e.alive) drawEnemy(e); });
        }

        function createExplosion(x, y, color) {
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 30 + Math.random() * 20,
                    color: color || '#f80'
                });
            }
        }

        function updateParticles() {
            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 50;
                ctx.fillRect(p.x, p.y, 4, 4);
                ctx.globalAlpha = 1;
            });
            particles = particles.filter(p => p.life > 0);
        }

        function updateEnemies() {
            let hitEdge = false;
            let aliveEnemies = enemies.filter(e => e.alive);
            if (aliveEnemies.length === 0) nextLevel();
            aliveEnemies.forEach(e => {
                if ((e.x <= 20 && enemyDirection === -1) || (e.x >= GAME_WIDTH - ENEMY_WIDTH - 20 && enemyDirection === 1)) hitEdge = true;
                e.x += enemySpeed * enemyDirection;
            });
            if (hitEdge) {
                enemyDirection *= -1;
                aliveEnemies.forEach(e => {
                    e.y += 20;
                    if (e.y >= player.y) endGame();
                });
            }
        }

        function shootBullet() {
            bullets.push({ x: player.x + player.width / 2, y: player.y });
        }

        function updatePlayer() {
            if (keys['ArrowLeft'] && player.x > 10) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < GAME_WIDTH - player.width - 10) player.x += player.speed;
            bullets = bullets.filter(b => b.y > 0);
        }

        function updateBullets() {
            bullets.forEach((b, bi) => {
                b.y -= 8;
                enemies.forEach((e, ei) => {
                    if (e.alive && b.x >= e.x && b.x <= e.x + e.width && b.y >= e.y && b.y <= e.y + e.height) {
                        e.alive = false;
                        bullets.splice(bi, 1);
                        createExplosion(e.x + e.width / 2, e.y + e.height / 2, ['#f', '#f0f', '#'][ENEMY_ROWS - ENEMY_ROWS]);
                        score += ({squid: 30, crab: 20, octopus: 10}[e.type]);
                    }
                });
            });
        }

        function updateEnemyBullets() {
            if (Math.random() < 0.02 + level * 0.005) {
                const alive = enemies.filter(e => e.alive);
                if (alive.length) {
                    const shooter = alive[Math.floor(Math.random() * alive.length)];
                    enemyBullets.push({ x: shooter.x + shooter.width / 2, y: shooter.y + shooter.height });
                }
            }
            enemyBullets.forEach((b, i) => {
                b.y += 5;
                if (b.y >= player.y + player.height) enemyBullets.splice(i, 1);
                else if (b.x >= player.x && b.x <= player.x + player.width && b.y >= player.y && b.y <= player.y + player.height) {
                    enemyBullets.splice(i, 1);
                    createExplosion(player.x + player.width / 2, player.y + player.height / 2, '#0f0');
                    lives--;
                    if (lives <= 0) endGame();
                }
            });
        }

        function nextLevel() {
            level++;
            enemySpeed = Math.min(enemySpeed + 1, 7);
            bullets = [];
            enemyBullets = [];
            initEnemies();
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('level').textContent = level;
        }

        function showMessage(msg) {
            const msgEl = document.getElementById('message');
            msgEl.textContent = msg;
            msgEl.style.display = 'block';
            setTimeout(() => { msgEl.style.display = 'none'; }, gameWon ? 3000 : 2000);
        }

        function endGame() {
            gameOver = true;
            showMessage('GAME OVER - Press R to Restart');
        }

        function restartGame() {
            score = 0;
            lives = 3;
            level = 1;
            enemySpeed = 2;
            bullets = [];
            enemyBullets = [];
            particles = [];
            player.x = GAME_WIDTH / 2 - 25;
            gameOver = false;
            initEnemies();
        }

        function drawBackground() {
            const stars = [
                ...Array.from({ length: 50 }, () => ({ x: Math.random() * GAME_WIDTH, y: Math.random() * (GAME_HEIGHT / 2), size: Math.random() * 2 + 1 })) // top
            ];
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            stars.forEach(s => {
                ctx.fillStyle = `rgba(${Math.min(255, 100 + s.size * 60)}, ${Math.min(255, 180 + s.size * 30)}, ${Math.min(255, 220 + s.size * 10)}, 0.7)`;
                ctx.fillRect(s.x, s.y, s.size, s.size);
            });
        }

        function update() {
            if (gameOver) return;
            drawBackground();
            drawPlayer();
            drawEnemyRow();
            drawBullets();
            drawEnemyBullets();
            updateParticles();
            updatePlayer();
            updateEnemies();
            updateBullets();
            updateEnemyBullets();
            updateUI();
            requestAnimationFrame(update);
        }

        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space' && !gameOver) shootBullet();
            if (e.code === 'KeyR' && gameOver) restartGame();
        });

        window.addEventListener('keyup', e => keys[e.code] = false);

        initEnemies();
        update();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders - Retro Arcade</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        #gameContainer { position: relative; }
        canvas { border: 4px solid #33ff00; display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #33ff00;
            font-size: 18px;
            text-align: center;
            width: 100%;
            pointer-events: none;
        }
        #instructions {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            color: #33ff00;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui">
            <div>SCORE: <span id="score">0</span></div>
            <div style="font-size:14px; margin-top:10px;">LIVES: <span id="lives">3</span></div>
        </div>
        <div id="instructions">← → to move | SPACE to shoot | Press Any Key to Start</div>
    </div>

    <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');

    // Audio context for sound effects
    let audioCtx;
    
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playSound(type) {
        if (!audioCtx) initAudio();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        if (type === 'shoot') {
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'explosion') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.2);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.2);
        } else if (type === 'hit') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'gameover') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 1);
            gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 1);
        }
    }

    // Game state
    let gameStarted = false;
    let gameOver = false;
    let score = 0;
    let level = 1;
    
    // Player
    const player = { x: 375, y: 520, width: 50, height: 30, speed: 7, color: '#33ff00' };
    
    // Bullets
    let bullets = [];
    let enemyBullets = [];
    const bulletSpeed = 10;
    let lastShot = 0;
    const shootDelay = 250;
    
    // Enemies
    const rows = 5;
    const cols = 10;
    const enemyWidth = 40;
    const enemyHeight = 30;
    const enemyPadding = 20;
    let enemies = [];
    let enemyDx = 1;
    let enemyDy = 0;
    let enemySpeed = 1 + (level - 1) * 0.5;
    
    // Particles for explosions
    let particles = [];

    function initEnemies() {
        enemies = [];
        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                let type = 'basic';
                if (row === 0) type = 'elite';
                else if (row < 3) type = 'standard';
                
                enemies.push({
                    x: col * (enemyWidth + enemyPadding) + 80,
                    y: row * (enemyHeight + enemyPadding) + 60,
                    width: enemyWidth,
                    height: enemyHeight,
                    type: type,
                    frames: 0,
                    alive: true
                });
            }
        }
    }

    function createExplosion(x, y, color) {
        for (let i = 0; i < 15; i++) {
            particles.push({
                x: x + enemyWidth/2,
                y: y + enemyHeight/2,
                vx: (Math.random() - 0.5) * 8,
                vy: (Math.random() - 0.5) * 8,
                life: 30 + Math.random() * 20,
                color: color || '#ff0'
            });
        }
    }

    function drawPlayer() {
        ctx.fillStyle = player.color;
        // Main body
        ctx.fillRect(player.x, player.y, player.width, player.height);
        // Turret
        ctx.fillRect(player.x + player.width/2 - 5, player.y - 10, 10, 10);
        // Wings
        ctx.fillRect(player.x - 10, player.y + 15, 15, 8);
        ctx.fillRect(player.x + player.width === 5, player.y + 15, 15, 8);
        
        // Engine glow
        ctx.fillStyle = '#00ffff';
        ctx.fillRect(player.x + 5, player.y + player.height, 8, 12);
        ctx.fillRect(player.x + player.width - 13, player.y + player.height, 8, 12);
    }

    function drawEnemy(enemy) {
        if (!enemy.alive) return;
        
        const colors = { basic: '#ff0', standard: '#f0f', elite: '#f00' };
        const color = colors[enemy.type] || '#ff0';
        
        ctx.fillStyle = color;
        enemy.frames++;
        const frameOffset = Math.sin(enemy.frames * 0.1) * 3;
        
        // Enemy body with animation
        ctx.fillRect(enemy.x + frameOffset, enemy.y, enemy.width, enemy.height);
        ctx.fillRect(enemy.x + 5 + frameOffset, enemy.y + 5, enemy.width - 10, enemy.height - 10);
        
        // Eyes
        ctx.fillStyle = '#000';
        ctx.fillRect(enemy.x + 12 + frameOffset, enemy.y + 8, 6, 6);
        ctx.fillRect(enemy.x + enemy.width - 18 + frameOffset, enemy.y + 8, 6, 6);
        
        // Antennae
        ctx.beginPath();
        ctx.moveTo(enemy.x + 5 + frameOffset, enemy.y);
        ctx.lineTo(enemy.x + 5 + frameOffset, enemy.y - 8);
        ctx.moveTo(enemy.x + enemy.width - 10 + frameOffset, enemy.y);
        ctx.lineTo(enemy.x + enemy.width - 8 + frameOffset, enemy.y - 8);
        ctx.strokeStyle = color;
        ctx.strokeWidth = 2;
        ctx.stroke();
    }

    function drawBullet(b) {
        ctx.fillStyle = '#0ff';
        ctx.fillRect(b.x, b.y, 4, 15);
    }

    function drawEnemyBullets() {
        ctx.fillStyle = '#f00';
        enemyBullets.forEach(b => {
            ctx.fillRect(b.x, b.y, 6, 12);
        });
    }

    function drawParticles() {
        particles.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life / 50;
            ctx.fillRect(p.x, p.y, 4, 4);
        });
        ctx.globalAlpha = 1;
    }

    function updatePlayer(keys) {
        if (keys['ArrowLeft']) player.x = Math.max(0, player.x - player.speed);
        if (keys['ArrowRight']) player.x = Math.min(canvas.width - player.width, player.x + player.speed);
    }

function shoot() {
    const now = Date.now();
    if (now - lastShot > shootDelay) {
        bullets.push({ x: player.x + player.width/2 - 2, y: player.y });
        lastShot = now;
        playSound('shoot');
    }
}

    function updateBullets() {
        bullets.forEach(b => b.y -= bulletSpeed);
        bullets = bullets.filter(b => b.y > -20);
        
        enemyBullets.forEach(b => b.y += bulletSpeed * 0.7);
        enemyBullets = enemyBullets.filter(b => b.y < canvas.height + 20);
    }

    function updateEnemies() {
        let shouldReverse = false;
        let livesLeft = 0;
        
        enemies.forEach(enemy => {
            if (!enemy.alive) return;
            
            enemy.x += enemyDx * enemySpeed;
            livesLeft++;
            
            if (enemy.x <= 10 || enemy.x + enemy.width >= canvas.width - 10) {
                shouldReverse = true;
            }
            
            // Random shooting
            if (Math.random() < 0.002 * level && enemy.alive) {
                enemyBullets.push({ 
                    x: enemy.x + enemy.width/2, 
                    y: enemy.y + enemy.height 
                });
            }
        });
        
        if (shouldReverse) {
            enemyDx = -enemyDx;
            enemies.forEach(enemy => {
                enemy.y += 20;
            });
        }
    }

    function checkCollisions() {
        // Bullets hitting enemies
        bullets.forEach(bullet => {
            for (let enemy of enemies) {
                if (!enemy.alive) continue;
                if (bullet.x < enemy.x + enemy.width &&
                    bullet.x + 4 > enemy.x &&
                    bullet.y < enemy.y + enemy.height &&
                    bullet.y + 15 > enemy.y) {
                    
                    enemy.alive = false;
                    bullet.x = -100;
                    score += enemy.type === 'elite' ? 30 : enemy.type === 'standard' ? 20 : 10;
                    createExplosion(enemy.x, enemy.y, 
                        enemy.type === 'elite' ? '#f00' : 
                        enemy.type === 'standard' ? '#f0f' : '#ff0');
                    scoreEl.textContent = score;
                    playSound('explosion');
                    break;
                }
            }
        });

        let playerHit = false;
        // Player getting hit by enemy bullets
        enemyBullets.forEach(bullet => {
            if (bullet.x < player.x + player.width &&
                bullet.x + 6 > player.x &&
                bullet.y < player.y + player.height &&
                bullet.y + 12 > player.y) {
                
                bullet.x = -100;
                createExplosion(player.x + player.width/2, player.y + player.height/2, '#33ff00');
                playerHit = true;
            }
        });
        
        if (playerHit) {
            lives -= 1;
            livesEl.innerHTML = '<span style="color:#f00">' + Math.max(0, lives) + '</span>';
            
            playSound('hit');
            
            if (lives <= 0) {
                gameOver = true;
                playSound('gameover');
            }
            
            setTimeout(() => { enemyBullets = []; }, 200);
        }
    }

    function updateParticles() {
        particles.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.life--;
        });
        particles = particles.filter(p => p.life > 0);
    }

    function drawStarfield() {
        ctx.fillStyle = '#fff';
        for (let i = 0; i < 50; i++) {
            const x = (Math.sin(i * 132.7 + Date.now() * 0.0001) * canvas.width + canvas.width) % canvas.width;
            const size = Math.random() * 2 + 0.5;
            ctx.fillRect(x, (i * 67) % canvas.height, size, size);
        }
    }

    function drawGameOver() {
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, canvas.height/2 - 80, canvas.width, 160);
        
        ctx.fillStyle = '#f00';
        ctx.font = 'bold 48px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2);
        
        ctx.fillStyle = '#33ff00';
        ctx.font = '24px Courier New';
        ctx.fillText(`Final Score: ${score}`, canvas.width/2, canvas.height/2 + 50);
        ctx.fillText('Press Any Key to Restart', canvas.width/2, canvas.height/2 + 90);
    }

    function drawStartScreen() {
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(0, canvas.height/2 - 80, canvas.width, 160);
        
        ctx.fillStyle = '#33ff00';
        ctx.font = 'bold 48px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('SPACE INVADERS', canvas.width/2, canvas.height/2 - 20);
        
        ctx.fillStyle = '#0ff';
        ctx.font = '20px Courier New';
        ctx.fillText('Arrows to Move | Space to Shoot', canvas.width/2, canvas.height/2 + 30);
    }

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        drawStarfield();
        
        if (!gameStarted) {
            drawStartScreen();
        } else if (!gameOver) {
            bullets.forEach(b => drawBullet(b));
            updateParticles();
            particles.forEach(p => p.color = p.color || '#ff0');
            
            updatePlayer(keys);
            drawPlayer();
            enemies.filter(e => e.alive).forEach(e => drawEnemy(e));
            drawEnemyBullets();
            drawParticles();
            updateBullets();
            updateEnemies();
            checkCollisions();
        } else {
            particles.forEach(p => p.color = p.color || '#ff0');
            drawGameOver();
        }
        
        requestAnimationFrame(gameLoop);
    }

    gameStarted = false;
    gameOver = false;
    score = 0;
    lives = 3;
    initEnemies();
    
    const keys = {};
    document.addEventListener('keydown', e => {
        if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
            keys[e.code] = true;
            e.preventDefault();
        }
        if (e.code === 'Space') {
            if (!gameStarted || gameOver) {
                gameStarted = !gameOver;
                gameOver = !gameStarted;
                if (!gameOver) {
                    initAudio();
                    const savedScore = document.getElementById('score').textContent;
                    score = parseFloat(savedScore) || 0 + (level - 1) * 100;
                    lives = 3;
                    livesEl.textContent = lives;
                }
                e.preventDefault();
            } else {
                shoot();
                e.preventDefault();
            }
        }
    });

    document.addEventListener('keyup', e => {
        if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
            keys[e.code] = false;
        }
    });

    gameLoop();
    </script>
</body>
</html>
